parameters:
  - name: serviceName
    type: string
  - name: acrName
    type: string

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '18.x'

  - script: |
      cd ${{ parameters.serviceName }}
      npm ci
      npm test -- --watchAll=false --passWithNoTests
    displayName: 'Test ${{ parameters.serviceName }}'

  - task: AzureCLI@2
    displayName: 'Build & Push ${{ parameters.serviceName }} to ACR'
    inputs:
      azureSubscription: 'Azure-Service-Connection'
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        az acr login --name ${{ parameters.acrName }}
        IMAGE=${{ parameters.acrName }}.azurecr.io/aurapan/${{ parameters.serviceName }}:$(Build.BuildId)
        docker build -t $IMAGE ./${{ parameters.serviceName }}
        docker push $IMAGE
