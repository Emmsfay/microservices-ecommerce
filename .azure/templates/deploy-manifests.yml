parameters:
  - name: buildId
    type: string

steps:
  - task: AzureCLI@2
    displayName: 'Get AKS Credentials'
    inputs:
      azureSubscription: 'Azure-Service-Connection'
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        az aks get-credentials \
          --resource-group aurapan-rg \
          --name aurapan-aks \
          --overwrite-existing

  - task: KubernetesManifest@1
    displayName: 'Apply Base + Prod K8s Manifests'
    inputs:
      action: deploy
      kubernetesServiceConnection: 'AKS-Service-Connection'
      namespace: default
      manifests: |
        infra/k8s/*.yaml
        infra/k8s-prod/*.yaml
      containers: |
        aurapanacr.azurecr.io/aurapan/auth:${{ parameters.buildId }}
        aurapanacr.azurecr.io/aurapan/product:${{ parameters.buildId }}
        aurapanacr.azurecr.io/aurapan/order:${{ parameters.buildId }}
        aurapanacr.azurecr.io/aurapan/payment:${{ parameters.buildId }}
        aurapanacr.azurecr.io/aurapan/expiration:${{ parameters.buildId }}
        aurapanacr.azurecr.io/aurapan/client:${{ parameters.buildId }}

  - task: KubernetesManifest@1
    displayName: 'Apply HPA'
    inputs:
      action: deploy
      kubernetesServiceConnection: 'AKS-Service-Connection'
      namespace: default
      manifests: infra/k8s-prod/hpa/*.yaml

  - script: |
      for SVC in auth product order payment client; do
        kubectl rollout status deployment/${SVC}-depl \
          --namespace default --timeout=300s
      done
    displayName: 'Verify All Rollouts'
